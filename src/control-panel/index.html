<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CelCat Control Panel</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="panel-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">CelCat Local Console</p>
        <h1>Control Panel</h1>
        <p id="hero-summary" class="hero-summary">本地控制面板用于查看 agent 工作区、任务执行状态和审批操作。</p>
      </div>
      <div class="hero-meta">
        <div class="hero-chip">
          <span>会话状态</span>
          <strong id="session-status">未知</strong>
        </div>
        <div class="hero-chip">
          <span>最近转写</span>
          <strong id="last-transcript">-</strong>
        </div>
        <div class="hero-chip">
          <span>自动执行</span>
          <strong id="auto-execute-state">-</strong>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="column column-list">
        <div class="section-head">
          <div>
            <p class="section-kicker">任务队列</p>
            <h2>Tasks</h2>
          </div>
          <button id="refresh-button" class="ghost-button" type="button">刷新</button>
        </div>
        <div id="task-list" class="task-list"></div>
      </section>

      <section class="column column-detail">
        <div class="section-head">
          <div>
            <p class="section-kicker">工作区详情</p>
            <h2 id="detail-title">等待任务</h2>
          </div>
          <span id="detail-status" class="status-pill">空闲</span>
        </div>

        <div class="detail-grid">
          <article class="surface">
            <h3>摘要</h3>
            <p id="detail-summary" class="surface-copy">当前没有后台任务。</p>
          </article>
          <article class="surface">
            <h3>结果</h3>
            <p id="detail-result" class="surface-copy">任务完成后会在这里显示结果摘要。</p>
          </article>
          <article class="surface">
            <h3>任务目标</h3>
            <p id="detail-mission" class="surface-copy">暂无任务目标</p>
          </article>
          <article class="surface">
            <h3>备注</h3>
            <div id="detail-notes" class="stack-list"></div>
          </article>
          <article class="surface">
            <h3>技能</h3>
            <div id="detail-skills" class="chip-row"></div>
          </article>
          <article class="surface">
            <h3>MCP</h3>
            <div id="detail-mcps" class="chip-row"></div>
          </article>
          <article class="surface wide">
            <h3>执行计划</h3>
            <div id="detail-steps" class="step-list"></div>
          </article>
          <article class="surface wide">
            <h3>产物</h3>
            <div id="detail-artifacts" class="artifact-list"></div>
          </article>
          <article class="surface wide">
            <h3>压缩上下文</h3>
            <pre id="detail-context" class="context-block">暂无压缩上下文</pre>
          </article>
          <article class="surface wide">
            <h3>记忆</h3>
            <div id="detail-memory" class="memory-list"></div>
          </article>
        </div>

        <div id="detail-actions" class="detail-actions">
          <button id="approve-button" type="button">继续执行</button>
          <button id="cancel-button" class="ghost-button" type="button">取消任务</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
