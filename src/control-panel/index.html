<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CelCat Control Panel</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CelCat</p>
        <h1>控制面板</h1>
        <p id="hero-summary" class="hero-summary">这里先保留最重要的后台状态，桌宠主界面不再显示这些细节。</p>
      </div>
      <div class="topbar-actions">
        <button id="refresh-button" class="ghost-button" type="button">刷新</button>
      </div>
    </header>

    <section class="summary-grid">
      <article class="card stat-card">
        <span class="stat-label">会话</span>
        <strong id="session-status">未知</strong>
      </article>
      <article class="card stat-card">
        <span class="stat-label">最近转写</span>
        <strong id="last-transcript">-</strong>
      </article>
      <article class="card stat-card">
        <span class="stat-label">自动执行</span>
        <strong id="auto-execute-state">-</strong>
      </article>
    </section>

    <main class="layout">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">任务队列</p>
            <h2>任务</h2>
          </div>
        </div>
        <div id="task-list" class="task-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">当前任务</p>
            <h2 id="detail-title">等待任务</h2>
          </div>
          <span id="detail-status" class="status-pill">空闲</span>
        </div>

        <div class="detail-stack">
          <article class="card">
            <h3>摘要</h3>
            <p id="detail-summary" class="copy">当前没有后台任务。</p>
          </article>

          <article class="card">
            <h3>结果</h3>
            <p id="detail-result" class="copy">任务完成后会在这里显示结果摘要。</p>
          </article>

          <article class="card">
            <h3>步骤</h3>
            <div id="detail-steps" class="stack-list"></div>
          </article>

          <article class="card">
            <h3>备注</h3>
            <div id="detail-notes" class="stack-list"></div>
          </article>
        </div>

        <div id="detail-actions" class="detail-actions">
          <button id="approve-button" type="button">继续执行</button>
          <button id="cancel-button" class="ghost-button" type="button">取消任务</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
