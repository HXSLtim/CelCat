<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' https://cubism.live2d.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https: wss:; worker-src 'self' blob:;"
  >
  <title>Live2D Companion</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <div id="window-chrome">
      <div id="drag-button" aria-hidden="true">
        <svg class="drag-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 6h10M3 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="2" cy="6" r="1" fill="currentColor"/>
          <circle cx="14" cy="6" r="1" fill="currentColor"/>
          <circle cx="2" cy="10" r="1" fill="currentColor"/>
          <circle cx="14" cy="10" r="1" fill="currentColor"/>
        </svg>
      </div>
      <div id="chrome-actions">
        <button id="menu-button" type="button" aria-label="打开窗口菜单" aria-expanded="false">
          <span class="menu-lines">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
        <div id="window-menu" class="hidden" role="menu" aria-hidden="true">
          <div id="auto-execute-panel">
            <div class="panel-copy">
              <span class="panel-title">自动执行</span>
              <p id="auto-execute-hint">当前会先确认中高风险任务。</p>
            </div>
            <label class="toggle" for="auto-execute-toggle">
              <input id="auto-execute-toggle" type="checkbox" />
              <span class="toggle-track" aria-hidden="true"></span>
            </label>
          </div>
          <div id="window-menu-actions"></div>
        </div>
      </div>
    </div>
    <div id="assistant-status" aria-live="polite" aria-atomic="true"></div>
    <div id="task-status" aria-live="polite" aria-atomic="true"></div>
    <aside id="workspace-panel" aria-live="polite" aria-atomic="false">
      <div class="workspace-surface">
        <div class="workspace-head">
          <div>
            <span class="workspace-kicker">Agent 工作区</span>
            <h2 id="workspace-title">等待任务</h2>
          </div>
          <span id="workspace-mode-badge">空闲</span>
        </div>
        <p id="workspace-summary">当你交给我一个后台任务时，这里会显示 agent 的执行工作区、步骤、技能和 MCP 能力。</p>
        <div class="workspace-section">
          <span class="workspace-section-title">任务目标</span>
          <p id="workspace-mission">暂无任务目标</p>
        </div>
        <div class="workspace-section">
          <span class="workspace-section-title">技能</span>
          <div id="workspace-skills" class="workspace-chip-row"></div>
        </div>
        <div class="workspace-section">
          <span class="workspace-section-title">MCP</span>
          <div id="workspace-mcps" class="workspace-chip-row"></div>
        </div>
        <div class="workspace-section">
          <span class="workspace-section-title">执行计划</span>
          <div id="workspace-steps" class="workspace-step-list"></div>
        </div>
        <div class="workspace-section">
          <span class="workspace-section-title">产物</span>
          <div id="workspace-artifacts" class="workspace-artifact-list"></div>
        </div>
        <div class="workspace-section">
          <span class="workspace-section-title">压缩上下文</span>
          <pre id="workspace-context" class="workspace-context">任务执行过程中，这里会生成压缩上下文。</pre>
        </div>
        <div class="workspace-section">
          <span class="workspace-section-title">记忆</span>
          <div id="workspace-memory" class="workspace-memory-list"></div>
        </div>
        <div class="workspace-section">
          <span class="workspace-section-title">备注</span>
          <div id="workspace-notes" class="workspace-note-list"></div>
        </div>
        <div class="workspace-section">
          <span class="workspace-section-title">结果</span>
          <p id="workspace-result">任务完成后，这里会显示整理好的结果摘要。</p>
        </div>
        <div id="workspace-actions" class="workspace-actions">
          <button id="workspace-approve-button" type="button">继续执行</button>
        </div>
      </div>
    </aside>
    <canvas id="live2d-canvas"></canvas>
  </div>
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="./bootstrap.js"></script>
</body>
</html>
