<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live2D Companion</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <div id="window-chrome">
      <div id="drag-button" aria-hidden="true">
        <svg class="drag-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 6h10M3 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="2" cy="6" r="1" fill="currentColor"/>
          <circle cx="14" cy="6" r="1" fill="currentColor"/>
          <circle cx="2" cy="10" r="1" fill="currentColor"/>
          <circle cx="14" cy="10" r="1" fill="currentColor"/>
        </svg>
      </div>
      <div id="chrome-actions">
        <button id="voice-button" type="button" aria-label="开始语音输入" aria-pressed="false">
          <svg class="voice-icon" width="14" height="18" viewBox="0 0 14 18" fill="none">
            <rect x="4" y="1" width="6" height="10" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2 8.5a5 5 0 0 0 10 0M7 13.5v3M4.5 16.5h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="menu-button" type="button" aria-label="打开窗口菜单" aria-expanded="false">
          <span class="menu-lines">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
        <div id="window-menu" class="hidden" role="menu" aria-hidden="true">
          <div id="voice-device-panel">
            <label for="voice-device-select">麦克风</label>
            <select id="voice-device-select"></select>
          </div>
          <div id="window-menu-actions"></div>
        </div>
      </div>
    </div>
    <div id="voice-status" aria-live="polite" aria-atomic="true"></div>
    <canvas id="live2d-canvas"></canvas>
  </div>
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script>
    require('./renderer.js');
  </script>
</body>
</html>
